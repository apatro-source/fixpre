<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <rect width="400" height="250" fill="#f8fafc"/>
  <!-- Request card -->
  <rect x="24" y="24" width="352" height="126" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="44" y="52" font-size="15" font-weight="800" fill="#1e1b3a">🔄 Shift swap request</text>
  <!-- swap people -->
  <circle cx="60" cy="92" r="16" fill="#eef2ff"/><text x="60" y="97" font-size="13" font-weight="700" fill="#6366f1" text-anchor="middle">J</text>
  <text x="84" y="89" font-size="13" font-weight="700" fill="#334155">John</text><text x="84" y="105" font-size="11" fill="#64748b">Fri · A shift</text>
  <text x="176" y="97" font-size="18" fill="#94a3b8" text-anchor="middle">⇄</text>
  <circle cx="212" cy="92" r="16" fill="#fce7f3"/><text x="212" y="97" font-size="13" font-weight="700" fill="#db2777" text-anchor="middle">S</text>
  <text x="236" y="89" font-size="13" font-weight="700" fill="#334155">Sara</text><text x="236" y="105" font-size="11" fill="#64748b">Fri · Off</text>
  <!-- buttons -->
  <rect x="44" y="120" width="150" height="20" rx="10" fill="#ecfdf5"/><text x="54" y="134" font-size="11" font-weight="700" fill="#16a34a">✓ Approve</text>
  <rect x="206" y="120" width="150" height="20" rx="10" fill="#fef2f2"/><text x="216" y="134" font-size="11" font-weight="700" fill="#dc2626">✕ Reject</text>
  <!-- success -->
  <rect x="24" y="166" width="352" height="58" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="24" y="166" width="6" height="58" rx="3" fill="#16a34a"/>
  <circle cx="58" cy="195" r="14" fill="#dcfce7"/><text x="58" y="200" font-size="14" text-anchor="middle">✓</text>
  <text x="82" y="190" font-size="13" font-weight="700" fill="#16a34a">Approved by manager</text>
  <text x="82" y="208" font-size="12" fill="#64748b">Weekly plan updated automatically</text>
</svg>
