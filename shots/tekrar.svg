<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <rect width="400" height="250" fill="#f8fafc"/>
  <rect x="24" y="24" width="352" height="202" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="44" y="56" font-size="16" font-weight="700" fill="#1e293b">🔁 Repeat task</text>
  <!-- Segmented control -->
  <rect x="44" y="70" width="312" height="36" rx="10" fill="#f1f5f9"/>
  <rect x="148" y="74" width="104" height="28" rx="8" fill="#6366f1"/>
  <text x="96" y="92" font-size="13" fill="#64748b" text-anchor="middle">Daily</text>
  <text x="200" y="92" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Weekly</text>
  <text x="304" y="92" font-size="13" fill="#64748b" text-anchor="middle">Monthly</text>
  <text x="44" y="138" font-size="12" fill="#64748b">Repeat on these days</text>
  <!-- Weekday chips: M T W T F S S, highlight Mon/Wed/Fri -->
  <g font-size="13" font-weight="700" text-anchor="middle">
    <rect x="44"  y="150" width="36" height="34" rx="9" fill="#6366f1"/><text x="62"  y="172" fill="#ffffff">M</text>
    <rect x="88"  y="150" width="36" height="34" rx="9" fill="#eef2ff"/><text x="106" y="172" fill="#64748b">T</text>
    <rect x="132" y="150" width="36" height="34" rx="9" fill="#6366f1"/><text x="150" y="172" fill="#ffffff">W</text>
    <rect x="176" y="150" width="36" height="34" rx="9" fill="#eef2ff"/><text x="194" y="172" fill="#64748b">T</text>
    <rect x="220" y="150" width="36" height="34" rx="9" fill="#6366f1"/><text x="238" y="172" fill="#ffffff">F</text>
    <rect x="264" y="150" width="36" height="34" rx="9" fill="#eef2ff"/><text x="282" y="172" fill="#64748b">S</text>
    <rect x="308" y="150" width="36" height="34" rx="9" fill="#eef2ff"/><text x="326" y="172" fill="#64748b">S</text>
  </g>
  <rect x="44" y="196" width="160" height="20" rx="10" fill="#ecfdf5"/>
  <text x="54" y="210" font-size="11" font-weight="700" fill="#16a34a">Every Mon · Wed · Fri</text>
</svg>
