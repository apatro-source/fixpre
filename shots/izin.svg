<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <rect width="400" height="250" fill="#f8fafc"/>
  <!-- Request card -->
  <rect x="24" y="26" width="352" height="124" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <circle cx="54" cy="58" r="16" fill="#eef2ff"/>
  <text x="54" y="63" font-size="14" font-weight="700" fill="#6366f1" text-anchor="middle">M</text>
  <text x="80" y="54" font-size="15" font-weight="700" fill="#1e293b">Leave request · Mike</text>
  <text x="80" y="73" font-size="12" fill="#64748b">Monday — day off</text>
  <!-- Buttons -->
  <rect x="40" y="98" width="150" height="36" rx="10" fill="#16a34a"/>
  <text x="115" y="121" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">✓ Approve</text>
  <rect x="206" y="98" width="150" height="36" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="281" y="121" font-size="13" font-weight="700" fill="#64748b" text-anchor="middle">✕ Reject</text>
  <!-- Hours balance -->
  <rect x="24" y="166" width="352" height="58" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="44" y="190" font-size="13" fill="#64748b">Overtime / missing hours balance</text>
  <rect x="44" y="198" width="92" height="20" rx="10" fill="#ecfdf5"/>
  <text x="54" y="212" font-size="11" font-weight="700" fill="#16a34a">+2h overtime</text>
  <rect x="146" y="198" width="92" height="20" rx="10" fill="#fef2f2"/>
  <text x="156" y="212" font-size="11" font-weight="700" fill="#dc2626">−1h missing</text>
</svg>
